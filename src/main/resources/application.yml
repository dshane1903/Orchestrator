forgeflow:
  application:
    name: forgeflow
    version: 0.1.0-SNAPSHOT

spring:
  datasource:
    url: ${FORGEFLOW_DATABASE_URL:jdbc:postgresql://localhost:5432/forgeflow}
    username: ${FORGEFLOW_DATABASE_USERNAME:forgeflow}
    password: ${FORGEFLOW_DATABASE_PASSWORD:forgeflow}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
