services:
  postgres:
    image: postgres:16-alpine
    container_name: forgeflow-postgres
    environment:
      POSTGRES_DB: forgeflow
      POSTGRES_USER: forgeflow
      POSTGRES_PASSWORD: forgeflow
    ports:
      - "${FORGEFLOW_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeflow -d forgeflow"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - forgeflow-postgres-data:/var/lib/postgresql/data

  forgeflow:
    build: .
    container_name: forgeflow-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FORGEFLOW_DATABASE_URL: jdbc:postgresql://postgres:5432/forgeflow
      FORGEFLOW_DATABASE_USERNAME: forgeflow
      FORGEFLOW_DATABASE_PASSWORD: forgeflow
    ports:
      - "${FORGEFLOW_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: forgeflow-prometheus
    depends_on:
      forgeflow:
        condition: service_healthy
    ports:
      - "${FORGEFLOW_PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    container_name: forgeflow-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${FORGEFLOW_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  forgeflow-postgres-data:
